<!DOCTYPE html>
<html>
<head>
<title>Chat.IN</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    display: flex;
    height: 100vh;
    background: #0f172a;
    color: white;
}

/* ✅ Sidebar */
#sidebar {
    width: 250px;
    background: #020617;
    border-right: 1px solid #1e293b;
    display: flex;
    flex-direction: column;
}

#newChatBtn {
    padding: 15px;
    background: #22c55e;
    border: none;
    cursor: pointer;
}

#chatList {
    flex: 1;
    overflow-y: auto;
}

.chatItem {
    padding: 10px;
    cursor: pointer;
    border-bottom: 1px solid #1e293b;
}

.chatItem:hover {
    background: #1e293b;
}

/* ✅ Main area */
#main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

header {
    padding: 15px;
    background: #020617;
    text-align: center;
}

/* Chat */
#chatContainer {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    position: relative;
}

.message {
    white-space: pre-wrap;
    max-width: 60%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 10px;
}

.user {
    background: #2563eb;
    margin-left: auto;
}

.bot {
    background: #1e293b;
}

/* Input */
        #inputArea {
            display: flex;
            padding: 15px;
            background: #020617;
            border-top: 1px solid #1e293b;
        }

input {
    flex: 1;
    padding: 10px;
}

/* Empty state */
#emptyState {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #94a3b8;
}
</style>
</head>

<body>

<!-- 🔥 Sidebar -->
<div id="sidebar">
    <button id="newChatBtn" onclick="createNewChat()">+ New Chat</button>
    <div id="chatList"></div>
</div>

<!-- 🔥 Main -->
<div id="main">
    <header>Chat.IN</header>

    <div id="chatContainer">
        <div id="emptyState">What’s on your mind today?</div>
    </div>

    <div id="inputArea">
        <input id="userInput" placeholder="Type..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>

let currentSessionId = null;

// 🔥 Load chats
function loadChats() {
    let chats = JSON.parse(localStorage.getItem("chat_sessions") || "[]");
    let list = document.getElementById("chatList");
    list.innerHTML = "";

    chats.forEach(c => {
        let div = document.createElement("div");
        div.className = "chatItem";
        div.innerText = c.title;
        div.onclick = () => switchChat(c.id);
        list.appendChild(div);
    });
}

// 🔥 Create new chat
function createNewChat() {
    let id = Date.now().toString();
    let chats = JSON.parse(localStorage.getItem("chat_sessions") || "[]");

    chats.unshift({ id, title: "New Chat" });
    localStorage.setItem("chat_sessions", JSON.stringify(chats));

    currentSessionId = id;
    localStorage.setItem("sessionId", id);

    document.getElementById("chatContainer").innerHTML =
        '<div id="emptyState">What’s on your mind today?</div>';

    loadChats();
}

// 🔥 Switch chat
function switchChat(id) {
    currentSessionId = id;
    localStorage.setItem("sessionId", id);

    let data = JSON.parse(localStorage.getItem("chat_" + id) || "[]");

    let chat = document.getElementById("chatContainer");
    chat.innerHTML = "";

    if (data.length === 0) {
        chat.innerHTML = '<div id="emptyState">What’s on your mind today?</div>';
        return;
    }

    data.forEach(m => {
        let div = document.createElement("div");
        div.className = "message " + m.role;
        div.innerText = m.content;
        chat.appendChild(div);
    });
}

// 🔥 Send message
async function sendMessage() {
    let input = document.getElementById("userInput");
    let msg = input.value.trim();
    if (!msg) return;

    let chat = document.getElementById("chatContainer");

    // hide empty
    let empty = document.getElementById("emptyState");
    if (empty) empty.remove();

    // user
    let userDiv = document.createElement("div");
    userDiv.className = "message user";
    userDiv.innerText = msg;
    chat.appendChild(userDiv);

    input.value = "";

    // bot placeholder
    let botDiv = document.createElement("div");
    botDiv.className = "message bot";
    chat.appendChild(botDiv);

    chat.scrollTop = chat.scrollHeight;

    // session
    let sessionId = localStorage.getItem("sessionId");
    if (!sessionId) {
        createNewChat();
        sessionId = localStorage.getItem("sessionId");
    }

    // save user msg
    let history = JSON.parse(localStorage.getItem("chat_" + sessionId) || "[]");
    history.push({ role: "user", content: msg });

    // call backend
    let res = await fetch(`/ask?strQuery=${encodeURIComponent(msg)}&sessionId=${sessionId}`);
    let text = await res.text();

    // type effect
    let i = 0;
    function type() {
        if (i < text.length) {
            botDiv.innerText += text[i++];
            chat.scrollTop = chat.scrollHeight;
            setTimeout(type, 10);
        }
    }
    type();

    history.push({ role: "bot", content: text });
    localStorage.setItem("chat_" + sessionId, JSON.stringify(history));

    // update title (first message)
    let chats = JSON.parse(localStorage.getItem("chat_sessions"));
    let chatObj = chats.find(c => c.id === sessionId);
    if (chatObj && chatObj.title === "New Chat") {
        chatObj.title = msg.substring(0, 20);
        localStorage.setItem("chat_sessions", JSON.stringify(chats));
        loadChats();
    }
}

// Enter key
document.getElementById("userInput")
.addEventListener("keypress", e => {
    if (e.key === "Enter") sendMessage();
});

// init
loadChats();

</script>

</body>
</html>
