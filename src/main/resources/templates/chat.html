<!DOCTYPE html>
<html>
<head>
    <title>AI Chat</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 15px;
            background: #020617;
            text-align: center;
            font-size: 18px;
            border-bottom: 1px solid #1e293b;
        }

        #chatContainer {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            max-width: 60%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            line-height: 1.5;
        }

        .user {
            background: #2563eb;
            margin-left: auto;
            text-align: right;
        }

        .bot {
            background: #1e293b;
            margin-right: auto;
        }

        #inputArea {
            display: flex;
            padding: 15px;
            background: #020617;
            border-top: 1px solid #1e293b;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        button {
            margin-left: 10px;
            padding: 12px 20px;
            background: #22c55e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }

        .typing {
            font-style: italic;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<header>🤖 AI Chat</header>

<div id="chatContainer"></div>

<div id="inputArea">
    <input type="text" id="userInput" placeholder="Type your message..." />
    <button onclick="sendMessage()">Send</button>
</div>

<script>

async function sendMessage() {

    let input = document.getElementById("userInput");
    let message = input.value.trim();
    if (!message) return;

    let chat = document.getElementById("chatContainer");

    // USER MESSAGE
    chat.innerHTML += `<div class="message user">${message}</div>`;
    input.value = "";

    // BOT MESSAGE CONTAINER
    let botId = "bot-" + Date.now();
    chat.innerHTML += `<div id="${botId}" class="message bot"></div>`;

    chat.scrollTop = chat.scrollHeight;

    try {
        console.log("Calling API...");
        let sessionId = localStorage.getItem("sessionId");
		console.log("sessionId...", sessionId);
          if (!sessionId) {
		  console.log("inside if ...", sessionId);
            sessionId = crypto.randomUUID();
			console.log("post crypto if ...", sessionId);
            localStorage.setItem("sessionId", sessionId);
          }
        let response = await fetch(`/ask?strQuery=${encodeURIComponent(message)}&sessionId=${sessionId}`);
        console.log("Response received:", response);
        let fullText = await response.text();
        console.log("fullText received:", fullText);
        let i = 0;
        let speed = 25; // lower = faster
        function typeEffect() {
            if (i < fullText.length) {
                document.getElementById(botId).innerHTML += fullText.charAt(i);
                i++;
                chat.scrollTop = chat.scrollHeight;
                setTimeout(typeEffect, speed);
            }
        }
        typeEffect();
    } catch (e) {
        document.getElementById(botId).innerText = "Error contacting server";
    }
}
document.getElementById("userInput")
    .addEventListener("keypress", function(e) {
        if (e.key === "Enter") sendMessage();
    });

</script>

</body>
</html>
