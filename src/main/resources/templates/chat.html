<!DOCTYPE html>
<html>
<head>
    <title>AI Chat</title>
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            text-align: center;
        }

        #chatBox {
            width: 60%;
            margin: 20px auto;
            border: 1px solid #444;
            padding: 10px;
            height: 400px;
            overflow-y: auto;
            background: #1e1e1e;
        }

        .user {
            text-align: right;
            color: #00d4ff;
            margin: 10px;
        }

        .bot {
            text-align: left;
            color: #00ff88;
            margin: 10px;
        }

        #inputArea {
            margin-top: 10px;
        }

        input {
            width: 50%;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background: #00d4ff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>AI Chat</h2>

<div id="chatBox"></div>

<div id="inputArea">
    <input type="text" id="userInput" placeholder="Type your message..." />
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    async function sendMessage() {
        let input = document.getElementById("userInput");
        let message = input.value.trim();

        if (!message) return;

        let chatBox = document.getElementById("chatBox");

        // show user message
        chatBox.innerHTML += `<div class="user">You: ${message}</div>`;
        input.value = "";

        try {
            // call Spring Boot API
            let response = await fetch(`/ask?strQuery=${encodeURIComponent(message)}`);
            let data = await response.text();

            // show bot response
            chatBox.innerHTML += `<div class="bot">Me: ${data}</div>`;
        } catch (error) {
            chatBox.innerHTML += `<div class="bot">❌ Error calling API</div>`;
        }

        // auto scroll
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // press Enter to send
    document.getElementById("userInput")
        .addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                sendMessage();
            }
        });
</script>

</body>
</html>
