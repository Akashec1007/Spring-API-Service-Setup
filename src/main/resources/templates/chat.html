<!DOCTYPE html>
<html>
<head>
    <link rel="icon" href="/favicon.ico?v=2">
    <title>Chat.IN</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            padding: 15px;
            background: #020617;
            text-align: center;
            font-size: 18px;
            border-bottom: 1px solid #1e293b;
        }
        #chatContainer {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message {
            white-space: pre-wrap;
            max-width: 60%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            line-height: 1.5;
        }
        .user {
            background: #2563eb;
            margin-left: auto;
            text-align: right;
        }
        .bot {
            background: #1e293b;
            margin-right: auto;
        }
        #inputArea {
            display: flex;
            padding: 15px;
            background: #020617;
            border-top: 1px solid #1e293b;
        }
        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 16px;
        }
        button {
            margin-left: 10px;
            padding: 12px 20px;
            background: #22c55e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }
        .typing {
            font-style: italic;
            opacity: 0.7;
        }
    </style>
</head>
<body>
<header>Chat.IN</header>
<div id="chatContainer"></div>
<div id="inputArea">
    <input type="text" id="userInput" placeholder="Type your message..." />
    <button onclick="sendMessage()">Send</button>
</div>
<script>
async function sendMessage() {
    let input = document.getElementById("userInput");
    let message = input.value.trim();
    if (!message) return;
    let chat = document.getElementById("chatContainer");
    // USER MESSAGE
    chat.innerHTML += `<div class="message user">${message}</div>`;
    input.value = "";
    // BOT MESSAGE CONTAINER
    let botId = "bot-" + Date.now();
    chat.innerHTML += `<div id="${botId}" class="message bot"></div>`;
    chat.scrollTop = chat.scrollHeight;
    try {
        let sessionId = localStorage.getItem("sessionId");
          if (!sessionId) {
            sessionId = (crypto && crypto.randomUUID) ? crypto.randomUUID() : Date.now().toString();
            localStorage.setItem("sessionId", sessionId);
          }
		console("sessionId------>",sessionId);
        let response = await fetch(`/ask?strQuery=${encodeURIComponent(message)}&sessionId=${sessionId}`);
        let fullText = await response.text();
        let i = 0;
        let speed = 15; // lower = faster
        function typeEffect() {
            if (i < fullText.length) {
                document.getElementById(botId).innerHTML += fullText.charAt(i);
                i++;
                chat.scrollTop = chat.scrollHeight;
                setTimeout(typeEffect, speed);
            }
        }
        typeEffect();
    } catch (e) {
        document.getElementById(botId).innerText = "Error contacting server";
    }
}
document.getElementById("userInput")
    .addEventListener("keypress", function(e) {
        if (e.key === "Enter") sendMessage();
    });
</script>
</body>
</html>
