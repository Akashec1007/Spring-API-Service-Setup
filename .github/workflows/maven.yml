name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Run JAR (Demo)
      run: |
          echo "Starting app..."
          java -jar target/*.jar &
          sleep 20

    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: springboot-app
        path: target/*.jar

    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6

    # 🔥 ======================
    # 🔐 GCP AUTH (OIDC)
    # 🔥 ======================
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v1
      with:
        workload_identity_provider: 'projects/167372543578/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
        service_account: 'admin@project-b4cce752-5923-4514-9d9.iam.gserviceaccount.com'

    # 🔥 ======================
    # 🚀 DEPLOY TO APP ENGINE
    # 🔥 ======================
    - name: Deploy to App Engine
      uses: google-github-actions/deploy-appengine@v1
      with:
        project_id: 'project-b4cce752-5923-4514-9d9'
